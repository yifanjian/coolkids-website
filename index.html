    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        html { scroll-behavior: smooth; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f8fafc; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Hardware Accelerated GPU Rendering for smooth 60fps jumping */
        .sunburst-animate {
            animation: bounceAcross 6s infinite 0.1s; 
            transform-origin: 0px 0px; 
            
            /* Forces Graphics Card to pre-calculate the layers to prevent lag/jerkiness */
            will-change: transform, color, opacity; 
            transform-style: preserve-3d;
            backface-visibility: hidden;
            perspective: 1000px;
        }
        .burst-element {
            fill: currentColor;
            stroke: currentColor;
        }

        /* * The Pixar Keyframes - Translated to 3D GPU instructions.
         * Base coordinate (0,0) is mapped perfectly to the top of the dotless 'ı' stem.
         */
        @keyframes bounceAcross {
            /* 1. Enter and drop onto C */
            0%   { transform: translate3d(-126px, -40px, 0) rotate(-90deg) scale(1); opacity: 0; color: #4ea8de; animation-timing-function: ease-in; }
            3%   { transform: translate3d(-126px, 8px, 0) rotate(0deg) scale(1.3, 0.7); opacity: 1; color: #4ea8de; animation-timing-function: ease-out; } 
            
            /* 2. Jump to O1 */
            6%   { transform: translate3d(-111px, -15px, 0) rotate(45deg) scale(0.9, 1.1); color: #4ea8de; animation-timing-function: ease-in; } 
            9%   { transform: translate3d(-96px, 8px, 0) rotate(90deg) scale(1.3, 0.7); color: #56cfe1; animation-timing-function: ease-out; } 
            
            /* 3. Jump to O2 */
            12%  { transform: translate3d(-82px, -15px, 0) rotate(135deg) scale(0.9, 1.1); color: #56cfe1; animation-timing-function: ease-in; } 
            15%  { transform: translate3d(-68px, 8px, 0) rotate(180deg) scale(1.3, 0.7); color: #64dfdf; animation-timing-function: ease-out; } 
            
            /* 4. Jump to L */
            18%  { transform: translate3d(-56px, -15px, 0) rotate(225deg) scale(0.9, 1.1); color: #64dfdf; animation-timing-function: ease-in; } 
            21%  { transform: translate3d(-45px, 8px, 0) rotate(270deg) scale(1.3, 0.7); color: #72efdd; animation-timing-function: ease-out; } 
            
            /* 5. Jump to k (taller letter, hits slightly higher at y=-2) */
            24%  { transform: translate3d(-31px, -20px, 0) rotate(315deg) scale(0.9, 1.1); color: #72efdd; animation-timing-function: ease-in; } 
            28%  { transform: translate3d(-17px, -2px, 0) rotate(360deg) scale(1.3, 0.7); color: #f59e0b; animation-timing-function: ease-out; } 
            
            /* 6. Huge leap OVER the 'ı', directly to the taller 'd' */
            32%  { transform: translate3d(-1px, -25px, 0) rotate(405deg) scale(0.9, 1.1); color: #f59e0b; animation-timing-function: ease-in; } 
            36%  { transform: translate3d(15px, -2px, 0) rotate(450deg) scale(1.3, 0.7); color: #f59e0b; animation-timing-function: ease-out; } 
            
            /* 7. Hop down to the shorter 's' */
            39%  { transform: translate3d(21px, -15px, 0) rotate(495deg) scale(0.9, 1.1); color: #f59e0b; animation-timing-function: ease-in; } 
            42%  { transform: translate3d(28px, 8px, 0) rotate(540deg) scale(1.3, 0.7); color: #f59e0b; animation-timing-function: ease-out; } 
            
            /* 8. BACKWARD spring to land on the 'ı' */
            47%  { transform: translate3d(14px, -25px, 0) rotate(495deg) scale(0.9, 1.1); color: #ef4444; animation-timing-function: ease-in; } 
            52%  { transform: translate3d(0px, 0px, 0) rotate(450deg) scale(1.3, 0.7); color: #ef4444; animation-timing-function: ease-out; } 
            
            /* 9. Settling jiggle and hold */
            55%  { transform: translate3d(0px, -6px, 0) rotate(450deg) scale(0.95, 1.05); color: #ef4444; animation-timing-function: ease-in; } 
            57%  { transform: translate3d(0px, 0px, 0) rotate(450deg) scale(1, 1); opacity: 1; color: #ef4444; } 
            
            90%  { transform: translate3d(0px, 0px, 0) rotate(450deg) scale(1, 1); opacity: 1; color: #ef4444; } 
            95%  { transform: translate3d(0px, 0px, 0) rotate(450deg) scale(1, 1); opacity: 0; color: #ef4444; } 
            100% { transform: translate3d(-126px, -40px, 0) rotate(-90deg) scale(1); opacity: 0; color: #4ea8de; } 
        }
    </style>
</head>

                <g fontFamily="Inter, sans-serif" fontWeight="900" fontSize="36">

        // --- PAGES ---

                            <button onClick={() => setCurrentPage('Team')} className="bg-white text-slate-700 border border-slate-200 px-8 py-3.5 rounded-full font-bold text-lg hover:bg-slate-50 hover:text-brand-blue shadow-sm transition-all transform hover:-translate-y-1">Meet the Team</button>
